<!DOCTYPE html>
<html lang="zh-CN" style="overscroll-behavior: none;">
<head>
    <meta charset="utf-8" />
    <title>Metro 3D · 深圳地铁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="description" content="A real-time 3D digital map of the Shenzhen Metro." />
    <link rel="stylesheet" href="./dist/metro-3d.css" />
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: #f4f5f7; color: #1c1d21; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
        #map { width: 100vw; height: 100vh; }
        #boot-error { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px; }
        #boot-error .card { background: #ffffff; border: 1px solid #e2e4e8; border-radius: 12px; padding: 24px 32px; max-width: 420px; }
        #boot-error code { background: #eceef1; padding: 1px 6px; border-radius: 3px; font-size: 90%; }
    </style>
    <script src="./dist/metro-3d.js"></script>
</head>
<body>
    <div id="map"></div>
    <script>
        const params = new URLSearchParams(location.search);
        const amapKey = params.get('key') || m3d.AMAP_KEY;
        const amapSecurityJsCode = params.get('sec') || m3d.AMAP_SECURITY_CODE || undefined;

        if (!amapKey) {
            document.body.innerHTML = `
                <div id="boot-error"><div class="card">
                    <h2>缺少 AMap Key</h2>
                    <p>构建时未注入 <code>M3D_AMAP_KEY</code>。</p>
                    <p>请把 <code>.env.example</code> 复制为 <code>.env</code> 并填入你的高德 Web 服务 key，然后重新运行 <code>npm run build</code>。</p>
                    <p>也可以临时附加 <code>?key=YOUR_KEY</code> 到 URL 上来测试。</p>
                </div></div>`;
        } else {
            window._metro = new m3d.MetroMap({
                container: 'map',
                amapKey,
                amapSecurityJsCode,
                center: [114.0579, 22.5431],
                zoom: 11.5,
                pitch: 55
            });
        }
    </script>
</body>
</html>
