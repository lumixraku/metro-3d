<!DOCTYPE html>
<html lang="zh-CN" style="overscroll-behavior: none;">
<head>
    <meta charset="utf-8" />
    <title>Metro 3D · 深圳地铁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="description" content="A real-time 3D digital map of the Shenzhen Metro." />
    <link rel="stylesheet" href="../dist/metro-3d.css" />
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: #0a0c10; }
        #map { width: 100vw; height: 100vh; }
    </style>
    <script src="../dist/metro-3d.js"></script>
</head>
<body>
    <div id="map"></div>
    <script>
        const params = new URLSearchParams(location.search);
        const map = new m3d.MetroMap({
            container: 'map',
            amapKey: params.get('key') || '715eb1e20c9c5a54146d752565e049eb',
            amapSecurityJsCode: params.get('sec') || undefined,
            center: [114.0579, 22.5431],
            zoom: 11.5,
            pitch: 55,
            speed: Number(params.get('speed') || 60)
        });
        window._metro = map;
    </script>
</body>
</html>
